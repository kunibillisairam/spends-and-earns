<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Started - Spends & Earns</title>
    <!-- Modern Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.4);
            --accent-primary: #4f46e5;
            --accent-secondary: #a855f7;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            overflow: hidden;
        }

        .bg-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url('auth_background_mesh_1776662792547.png') no-repeat center center/cover;
            filter: blur(5px) brightness(0.8);
            transform: scale(1.1);
            z-index: -1;
            transition: all 1s ease;
        }

        .auth-container {
            width: 100%;
            max-width: 440px;
            padding: 20px;
            z-index: 10;
            perspective: 1000px;
        }

        .auth-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
            animation: cardEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        @keyframes cardEntrance {
            from { transform: translateY(30px) rotateX(-10deg); opacity: 0; }
            to { transform: translateY(0) rotateX(0); opacity: 1; }
        }

        /* Decorative blobs */
        .auth-card::before {
            content: '';
            position: absolute;
            top: -50px; right: -50px;
            width: 120px; height: 120px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 50%;
            opacity: 0.2;
            filter: blur(30px);
            z-index: -1;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .auth-logo {
            font-size: 40px;
            margin-bottom: 15px;
            display: inline-block;
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .auth-header h1 {
            font-size: 32px;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(135deg, #1e293b 0%, #475569 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .auth-header p {
            color: #475569;
            font-size: 15px;
            margin-top: 10px;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 22px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 8px;
            margin-left: 4px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            color: #64748b;
            font-size: 18px;
        }

        .form-group input {
            width: 100%;
            padding: 15px 16px 15px 44px;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 16px;
            font-size: 15px;
            font-family: inherit;
            color: #0f172a;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .form-group input:focus {
            background: white;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
            outline: none;
        }

        .form-group input::placeholder {
            color: #94a3b8;
        }

        .submit-btn {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 18px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -5px rgba(79, 70, 229, 0.4);
            filter: brightness(1.1);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .auth-footer {
            margin-top: 25px;
            text-align: center;
            font-size: 15px;
            color: #475569;
            font-weight: 500;
        }

        .auth-footer span {
            color: var(--accent-primary);
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
            margin-left: 5px;
        }

        .auth-footer span:hover {
            color: var(--accent-secondary);
            text-decoration: underline;
        }

        .helper-links {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            font-size: 13px;
        }

        .helper-links span {
            color: #64748b;
            cursor: pointer;
            font-weight: 600;
            transition: color 0.2s;
        }

        .helper-links span:hover {
            color: var(--accent-primary);
        }

        /* Animations for switching states */
        .fade-in {
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile specific adjustments */
        @media (max-width: 480px) {
            .auth-card {
                padding: 30px 20px;
            }
            .auth-header h1 {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-overlay"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <span class="auth-logo">💰</span>
                <h1 id="auth-title">Welcome Back</h1>
                <p id="auth-subtitle">Login to manage your daily expenses.</p>
            </div>

            <form id="auth-form">
                <!-- Signup Only Field -->
                <div class="form-group signup-only" style="display: none;">
                    <label>Full Name</label>
                    <div class="input-wrapper">
                        <i>👤</i>
                        <input type="text" id="username" placeholder="John Doe">
                    </div>
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <div class="input-wrapper">
                        <i>📱</i>
                        <input type="tel" id="phone" placeholder="9876543210" pattern="[0-9]{10}" maxlength="10" required oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i>🔒</i>
                        <input type="password" id="password" placeholder="••••••••" required theme="dark">
                    </div>
                    <div class="helper-links login-only">
                        <span></span> <!-- Spacer -->
                        <span id="forgot-pw">Forgot Password?</span>
                    </div>
                </div>

                <!-- Signup Only Field -->
                <div class="form-group signup-only" style="display: none;">
                    <label>Confirm Password</label>
                    <div class="input-wrapper">
                        <i>✅</i>
                        <input type="password" id="confirm-password" placeholder="••••••••">
                    </div>
                </div>

                <button type="submit" id="auth-submit-btn" class="submit-btn">Login</button>
            </form>

            <div class="auth-footer">
                <p id="toggle-text">New here?<span id="switch-auth">Create Account</span></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
        import { firebaseConfig } from "./firebase-config.js";

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let isLogin = true;
        const authTitle = document.getElementById('auth-title');
        const authSubtitle = document.getElementById('auth-subtitle');
        const signupFields = document.querySelectorAll('.signup-only');
        const loginOnlyFields = document.querySelectorAll('.login-only');
        const switchAuth = document.getElementById('switch-auth');
        const toggleText = document.getElementById('toggle-text');
        const authForm = document.getElementById('auth-form');
        const submitBtn = document.getElementById('auth-submit-btn');

        function toggleMode() {
            isLogin = !isLogin;
            
            // Add fade animation class
            const card = document.querySelector('.auth-card');
            card.classList.remove('fade-in');
            void card.offsetWidth; // Trigger reflow
            card.classList.add('fade-in');

            authTitle.textContent = isLogin ? "Welcome Back" : "Create Account";
            authSubtitle.textContent = isLogin ? "Login to manage your daily expenses." : "Join us to start tracking smart.";
            submitBtn.textContent = isLogin ? "Login" : "Get Started";
            
            toggleText.innerHTML = isLogin ? 
                'New here? <span id="switch-auth">Create Account</span>' : 
                'Already joined? <span id="switch-auth">Login Instead</span>';

            signupFields.forEach(f => f.style.display = isLogin ? 'none' : 'block');
            loginOnlyFields.forEach(f => f.style.display = isLogin ? 'flex' : 'none');
            
            // Re-bind listeners because we replaced the innerHTML
            document.getElementById('switch-auth').addEventListener('click', toggleMode);
        }

        switchAuth.addEventListener('click', toggleMode);

        document.getElementById('forgot-pw').addEventListener('click', () => {
            alert("Password recovery is coming soon! For now, please contact support.");
        });

        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const usernameInput = document.getElementById('username')?.value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password')?.value;

            if (!isLogin && password !== confirmPassword) {
                return alert("Passwords do not match!");
            }

            submitBtn.textContent = "Checking Details...";
            submitBtn.disabled = true;

            try {
                const userRef = doc(db, "users", phone);
                const userSnap = await getDoc(userRef);

                if (isLogin) {
                    if (userSnap.exists()) {
                        const userData = userSnap.data();
                        if (userData.password === password) {
                            localStorage.setItem('currentUser', JSON.stringify({
                                username: userData.username,
                                phone: userData.phone
                            }));
                            window.location.replace('index.html');
                        } else {
                            alert("Incorrect password. Please try again.");
                        }
                    } else {
                        alert("Account not found with this phone number.");
                    }
                } else {
                    if (userSnap.exists()) {
                        alert("This phone number is already registered.");
                    } else {
                        await setDoc(userRef, {
                            username: usernameInput,
                            phone: phone,
                            password: password,
                            createdAt: new Date().toISOString()
                        });
                        alert("Account created successfully! Welcome aboard.");
                        window.location.reload();
                    }
                }
            } catch (err) {
                console.error(err);
                alert("Something went wrong. Please check your connection.");
            } finally {
                submitBtn.textContent = isLogin ? "Login" : "Get Started";
                submitBtn.disabled = false;
            }
        });

        if(localStorage.getItem('currentUser')) {
            window.location.replace('index.html');
        }
    </script>
</body>
</html>
