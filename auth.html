<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Started - Spends & Earns</title>
    <!-- Modern Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.4);
            --accent-primary: #4f46e5;
            --accent-secondary: #a855f7;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            overflow: hidden;
        }

        .bg-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url('auth_background_mesh_1776662792547.png') no-repeat center center/cover;
            filter: blur(5px) brightness(0.8);
            transform: scale(1.1);
            z-index: -1;
            transition: all 1s ease;
        }

        .auth-container {
            width: 100%;
            max-width: 440px;
            padding: 20px;
            z-index: 10;
            perspective: 1000px;
        }

        .auth-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
            animation: cardEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        @keyframes cardEntrance {
            from { transform: translateY(30px) rotateX(-10deg); opacity: 0; }
            to { transform: translateY(0) rotateX(0); opacity: 1; }
        }

        /* Decorative blobs */
        .auth-card::before {
            content: '';
            position: absolute;
            top: -50px; right: -50px;
            width: 120px; height: 120px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 50%;
            opacity: 0.2;
            filter: blur(30px);
            z-index: -1;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .auth-logo {
            font-size: 40px;
            margin-bottom: 15px;
            display: inline-block;
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .auth-header h1 {
            font-size: 32px;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(135deg, #1e293b 0%, #475569 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .auth-header p {
            color: #475569;
            font-size: 15px;
            margin-top: 10px;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 22px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 8px;
            margin-left: 4px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            color: #64748b;
            font-size: 18px;
        }

        .form-group input {
            width: 100%;
            padding: 15px 16px 15px 44px;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 16px;
            font-size: 15px;
            font-family: inherit;
            color: #0f172a;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .form-group input:focus {
            background: white;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
            outline: none;
        }

        .form-group input::placeholder {
            color: #94a3b8;
        }

        .submit-btn {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 18px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -5px rgba(79, 70, 229, 0.4);
            filter: brightness(1.1);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .auth-footer {
            margin-top: 25px;
            text-align: center;
            font-size: 15px;
            color: #475569;
            font-weight: 500;
        }

        .auth-footer span {
            color: var(--accent-primary);
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
            margin-left: 5px;
        }

        .auth-footer span:hover {
            color: var(--accent-secondary);
            text-decoration: underline;
        }

        .helper-links {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            font-size: 13px;
        }

        .helper-links span {
            color: #64748b;
            cursor: pointer;
            font-weight: 600;
            transition: color 0.2s;
        }

        .helper-links span:hover {
            color: var(--accent-primary);
        }

        /* Animations for switching states */
        .fade-in {
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile specific adjustments */
        @media (max-width: 480px) {
            .auth-card {
                padding: 30px 20px;
            }
            .auth-header h1 {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-overlay"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <span class="auth-logo">💰</span>
                <h1 id="auth-title">Welcome Back</h1>
                <p id="auth-subtitle">Login to manage your daily expenses.</p>
            </div>

            <form id="auth-form">
                <!-- Signup Only Field -->
                <div class="form-group signup-only" style="display: none;">
                    <label>Full Name</label>
                    <div class="input-wrapper">
                        <i>👤</i>
                        <input type="text" id="username" placeholder="John Doe">
                    </div>
                </div>

                <!-- NEW: Email for Recovery -->
                <div class="form-group signup-only" style="display: none;">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <i>📧</i>
                        <input type="email" id="email" placeholder="john@example.com">
                    </div>
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <div class="input-wrapper">
                        <i>📱</i>
                        <input type="tel" id="phone" placeholder="9876543210" pattern="[0-9]{10}" maxlength="10" required oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                    </div>
                </div>

                <div class="form-group" id="password-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i>🔒</i>
                        <input type="password" id="password" placeholder="••••••••" required theme="dark">
                    </div>
                    <div class="helper-links login-only">
                        <span></span> <!-- Spacer -->
                        <span id="forgot-pw-trigger">Forgot Password?</span>
                    </div>
                </div>

                <!-- Signup Only Field -->
                <div class="form-group signup-only" style="display: none;">
                    <label>Confirm Password</label>
                    <div class="input-wrapper">
                        <i>✅</i>
                        <input type="password" id="confirm-password" placeholder="••••••••">
                    </div>
                </div>

                <button type="submit" id="auth-submit-btn" class="submit-btn">Login</button>
            </form>

            <!-- Forgot Password View (Shared container) -->
            <div id="forgot-pw-view" style="display: none;">
                <div id="fp-step-1">
                    <p style="font-size: 14px; color: #475569; margin-bottom: 20px;">Enter your registered phone to receive an OTP on your email.</p>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <div class="input-wrapper">
                            <i>📱</i>
                            <input type="tel" id="fp-phone" placeholder="9876543210" maxlength="10">
                        </div>
                    </div>
                    <button type="button" id="send-otp-btn" class="submit-btn">Send OTP</button>
                </div>

                <div id="fp-step-2" style="display: none;">
                    <p style="font-size: 14px; color: #475569; margin-bottom: 20px;" id="otp-status-text">OTP sent to your email. Please check.</p>
                    <div class="form-group">
                        <label>Enter 6-Digit OTP</label>
                        <div class="input-wrapper">
                            <i>🔢</i>
                            <input type="text" id="fp-otp" placeholder="123456" maxlength="6" style="text-align: center; letter-spacing: 5px; font-weight: 800;">
                        </div>
                    </div>
                    <button type="button" id="verify-otp-btn" class="submit-btn">Verify OTP</button>
                </div>

                <div id="fp-step-3" style="display: none;">
                    <p style="font-size: 14px; color: #475569; margin-bottom: 20px;">Identity verified! Set your new password.</p>
                    <div class="form-group">
                        <label>New Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="fp-new-password" placeholder="••••••••">
                        </div>
                    </div>
                    <button type="button" id="reset-pw-btn" class="submit-btn">Update Password</button>
                </div>

                <div class="auth-footer" style="margin-top: 15px;">
                    <p><span id="back-to-login">Back to Login</span></p>
                </div>
            </div>

            <div class="auth-footer" id="main-footer">
                <p id="toggle-text">New here?<span id="switch-auth">Create Account</span></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
        import { firebaseConfig } from "./firebase-config.js";

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let isLogin = true;
        const authTitle = document.getElementById('auth-title');
        const authSubtitle = document.getElementById('auth-subtitle');
        const signupFields = document.querySelectorAll('.signup-only');
        const loginOnlyFields = document.querySelectorAll('.login-only');
        const authForm = document.getElementById('auth-form');
        const submitBtn = document.getElementById('auth-submit-btn');
        const forgotPwView = document.getElementById('forgot-pw-view');
        const mainFooter = document.getElementById('main-footer');

        function toggleMode() {
            isLogin = !isLogin;
            
            const card = document.querySelector('.auth-card');
            card.classList.remove('fade-in');
            void card.offsetWidth; 
            card.classList.add('fade-in');

            authTitle.textContent = isLogin ? "Welcome Back" : "Create Account";
            authSubtitle.textContent = isLogin ? "Login to manage your daily expenses." : "Join us to start tracking smart.";
            submitBtn.textContent = isLogin ? "Login" : "Get Started";
            
            document.getElementById('main-footer').innerHTML = isLogin ? 
                '<p id="toggle-text">New here? <span id="switch-auth">Create Account</span></p>' : 
                '<p id="toggle-text">Already joined? <span id="switch-auth">Login Instead</span></p>';

            signupFields.forEach(f => f.style.display = isLogin ? 'none' : 'block');
            loginOnlyFields.forEach(f => f.style.display = isLogin ? 'flex' : 'none');
            
            document.getElementById('switch-auth').addEventListener('click', toggleMode);
        }

        document.getElementById('switch-auth').addEventListener('click', toggleMode);

        // Forgot Password UI Transitions
        document.getElementById('forgot-pw-trigger').addEventListener('click', () => {
            authForm.style.display = 'none';
            forgotPwView.style.display = 'block';
            mainFooter.style.display = 'none';
            authTitle.textContent = "Reset Password";
            authSubtitle.textContent = "Follow the steps to recover your access.";
        });

        document.getElementById('back-to-login').addEventListener('click', () => {
            authForm.style.display = 'block';
            forgotPwView.style.display = 'none';
            mainFooter.style.display = 'block';
            authTitle.textContent = isLogin ? "Welcome Back" : "Create Account";
            authSubtitle.textContent = isLogin ? "Login to manage your daily expenses." : "Join us to start tracking smart.";
        });

        // 1. Send OTP Logic
        document.getElementById('send-otp-btn').addEventListener('click', async () => {
            const phone = document.getElementById('fp-phone').value;
            if (phone.length !== 10) return alert("Please enter valid 10-digit phone number");

            const btn = document.getElementById('send-otp-btn');
            btn.textContent = "Looking up user...";
            btn.disabled = true;

            try {
                const userRef = doc(db, "users", phone);
                const userSnap = await getDoc(userRef);

                if (!userSnap.exists()) {
                    alert("No account found with this phone number.");
                    return;
                }

                const userData = userSnap.data();
                if (!userData.email) {
                    alert("This account doesn't have a recovery email. Please contact support.");
                    return;
                }

                // Generate 6-Digit OTP
                const otp = Math.floor(100000 + Math.random() * 900000).toString();
                
                // Store OTP in Firestore temporarily (expires in 10 mins)
                const otpExpiry = Date.now() + (10 * 60 * 1000);
                await setDoc(doc(db, "otps", phone), {
                    otp: otp,
                    expiry: otpExpiry
                });

                // Trigger Mail Sending (via our API)
                // Note: You need to set up the API route I'll create next
                const response = await fetch('/api/auth/send-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userData.email, otp: otp })
                });

                if (response.ok) {
                    document.getElementById('fp-step-1').style.display = 'none';
                    document.getElementById('fp-step-2').style.display = 'block';
                    const maskedEmail = userData.email.replace(/(.{3})(.*)(?=@)/, (gp1, gp2, gp3) => gp2 + "*".repeat(gp3.length));
                    document.getElementById('otp-status-text').textContent = `Verification code sent to ${maskedEmail}`;
                } else {
                    alert("Failed to send email. Redirecting to manual verification...");
                    // For demo/dev purposes, usually you'd show an error. 
                    // But here we'll log it for the user to see the OTP in console if they haven't set up the API yet
                    console.log("DEV ONLY - YOUR OTP IS:", otp);
                }
            } catch (err) {
                console.error(err);
                alert("Error: " + err.message);
            } finally {
                btn.textContent = "Send OTP";
                btn.disabled = false;
            }
        });

        // 2. Verify OTP Logic
        document.getElementById('verify-otp-btn').addEventListener('click', async () => {
            const phone = document.getElementById('fp-phone').value;
            const inputOtp = document.getElementById('fp-otp').value;

            if (inputOtp.length !== 6) return alert("Please enter 6-digit OTP");

            try {
                const otpSnap = await getDoc(doc(db, "otps", phone));
                if (!otpSnap.exists()) return alert("OTP expired or invalid. Try again.");

                const { otp, expiry } = otpSnap.data();

                if (Date.now() > expiry) return alert("OTP has expired. Please request a new one.");
                if (otp !== inputOtp) return alert("Incorrect OTP. Please try again.");

                // Success
                document.getElementById('fp-step-2').style.display = 'none';
                document.getElementById('fp-step-3').style.display = 'block';
            } catch (err) {
                alert("Verification failed.");
            }
        });

        // 3. Reset Password Logic
        document.getElementById('reset-pw-btn').addEventListener('click', async () => {
            const phone = document.getElementById('fp-phone').value;
            const newPassword = document.getElementById('fp-new-password').value;

            if (newPassword.length < 4) return alert("Password must be at least 4 characters.");

            try {
                const userRef = doc(db, "users", phone);
                await setDoc(userRef, { password: newPassword }, { merge: true });
                
                alert("Password updated successfully! Redirecting to login...");
                window.location.reload();
            } catch (err) {
                alert("Failed to update password.");
            }
        });

        // Auth Form Logic (Signup & Login)
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const usernameInput = document.getElementById('username')?.value;
            const emailInput = document.getElementById('email')?.value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password')?.value;

            if (!isLogin && (!emailInput || !emailInput.includes('@'))) {
                return alert("Please provide a valid email for account recovery!");
            }

            if (!isLogin && password !== confirmPassword) {
                return alert("Passwords do not match!");
            }

            submitBtn.textContent = "Checking Details...";
            submitBtn.disabled = true;

            try {
                const userRef = doc(db, "users", phone);
                const userSnap = await getDoc(userRef);

                if (isLogin) {
                    if (userSnap.exists()) {
                        const userData = userSnap.data();
                        if (userData.password === password) {
                            localStorage.setItem('currentUser', JSON.stringify({
                                username: userData.username,
                                phone: userData.phone
                            }));
                            window.location.replace('index.html');
                        } else {
                            alert("Incorrect password. Please try again.");
                        }
                    } else {
                        alert("Account not found with this phone number.");
                    }
                } else {
                    if (userSnap.exists()) {
                        alert("This phone number is already registered.");
                    } else {
                        await setDoc(userRef, {
                            username: usernameInput,
                            email: emailInput, // SAVING EMAIL NOW
                            phone: phone,
                            password: password,
                            createdAt: new Date().toISOString()
                        });
                        alert("Account created successfully! Welcome aboard.");
                        window.location.reload();
                    }
                }
            } catch (err) {
                console.error(err);
                alert("Something went wrong. Please check your connection.");
            } finally {
                submitBtn.textContent = isLogin ? "Login" : "Get Started";
                submitBtn.disabled = false;
            }
        });

        if(localStorage.getItem('currentUser')) {
            window.location.replace('index.html');
        }
    </script>
</body>
</html>
