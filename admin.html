<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin HQ - Spends & Earns</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #f8fafc; }
        .admin-main { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .admin-header h1 { font-size: 28px; font-weight: 800; color: #1e293b; letter-spacing: -0.05em; }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            color: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
            position: relative;
            overflow: hidden;
        }
        .stat-card h3 { font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; opacity: 0.9; }
        .stat-card .value { font-size: 48px; font-weight: 800; margin-top: 5px; }
        .stat-card .bg-icon { position: absolute; right: -20px; bottom: -20px; font-size: 100px; opacity: 0.1; }

        .broadcast-panel {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        .broadcast-panel h2 { font-size: 20px; font-weight: 800; margin-bottom: 20px; }
        
        .templates { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
        .template-btn { 
            background: #f1f5f9; border: 1px solid #e2e8f0; padding: 8px 16px; 
            border-radius: 20px; font-size: 13px; font-weight: 600; white-space: nowrap; cursor: pointer; transition: all 0.2s;
        }
        .template-btn:hover { background: #e2e8f0; }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 700; margin-bottom: 8px; color: var(--text-muted); font-size: 12px; text-transform: uppercase; }
        input, textarea { width: 100%; padding: 15px; border: 1px solid var(--border-color); border-radius: 12px; font-family: inherit; font-size: 15px; }
        input:focus, textarea:focus { border-color: var(--primary-color); outline: none; }
        
        .send-btn { width: 100%; padding: 18px; font-size: 16px; border-radius: 14px; }
        #status { margin-top: 15px; text-align: center; font-weight: 700; height: 20px; }
    </style>
</head>
<body>
    <!-- ADMIN LOGIN SCREEN -->
    <div id="admin-login-screen" style="max-width: 400px; margin: 100px auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
        <h2 style="text-align: center; margin-bottom: 5px; font-weight: 800; color: #1e293b;">Admin Access</h2>
        <p style="text-align: center; font-size: 14px; color: var(--text-muted); margin-bottom: 30px;">Authorized personnel only</p>
        
        <div class="form-group">
            <label>Admin Username</label>
            <input type="text" id="admin-username" placeholder="Enter username">
        </div>
        <div class="form-group">
            <label>Admin Password</label>
            <input type="password" id="admin-password" placeholder="••••••••">
        </div>
        <button id="admin-login-btn" class="primary-btn send-btn" style="background: linear-gradient(135deg, #1e293b, #0f172a);">Login</button>
        <p id="admin-login-error" style="color: #ef4444; font-size: 13px; text-align: center; margin-top: 15px; display: none;">Invalid credentials!</p>
    </div>

    <!-- ADMIN DASHBOARD (Hidden by default) -->
    <div class="admin-main" id="admin-dashboard-screen" style="display:none;">
        <div class="admin-header">
            <h1>Admin HQ ⚡</h1>
            <a href="index.html" style="text-decoration: none; color: #6366f1; font-weight: 600;">Home</a>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="bg-icon">👥</div>
                <h3>Registered Users</h3>
                <div class="value" id="user-count">...</div>
            </div>
            <div class="stat-card" style="background: linear-gradient(135deg, #10b981, #059669);">
                <div class="bg-icon">📢</div>
                <h3>Broadcast Status</h3>
                <div class="value" style="font-size: 30px; margin-top: 15px;">Ready</div>
            </div>
        </div>

        <div class="broadcast-panel">
            <h2>Send Broadcast Message</h2>
            
            <div class="templates">
                <button class="template-btn" data-title="New Update! 🚀" data-body="A new version of Spends & Earns is available. Refresh your app!">Update Layout</button>
                <button class="template-btn" data-title="Server Maintenance 🛠️" data-body="We will be doing brief maintenance at midnight. Your data is safe!">Maintenance</button>
                <button class="template-btn" data-title="Tip of the Day 💡" data-body="Did you know? You can now export your expenses as a CSV file from your profile!">Tip</button>
            </div>

            <div class="form-group">
                <label>Notification Title</label>
                <input type="text" id="title" placeholder="e.g. System Update">
            </div>

            <div class="form-group">
                <label>Message Content</label>
                <textarea id="message" rows="4" placeholder="Type your message here..."></textarea>
            </div>

            <button id="send-btn" class="primary-btn send-btn">Send Broadcast Now</button>
            <div id="status"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDocs, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
        import { firebaseConfig } from "./firebase-config.js";

        // Admin Auth Logic
        const loginScreen = document.getElementById('admin-login-screen');
        const dashboardScreen = document.getElementById('admin-dashboard-screen');
        const loginBtn = document.getElementById('admin-login-btn');
        const errorEl = document.getElementById('admin-login-error');

        // Check session
        if (sessionStorage.getItem('adminAuth') === 'true') {
            showDashboard();
        }

        loginBtn.addEventListener('click', () => {
            const user = document.getElementById('admin-username').value;
            const pass = document.getElementById('admin-password').value;

            // Simple Admin check (You can change these values)
            if (user === 'admin' && pass === 'admin123') {
                sessionStorage.setItem('adminAuth', 'true');
                showDashboard();
            } else {
                errorEl.style.display = 'block';
            }
        });

        function showDashboard() {
            loginScreen.style.display = 'none';
            dashboardScreen.style.display = 'block';
            fetchUserCount();
        }

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Fetch Total Users
        async function fetchUserCount() {
            try {
                const usersSnap = await getDocs(collection(db, "users"));
                document.getElementById('user-count').textContent = usersSnap.size;
            } catch (err) {
                console.error("Could not fetch users", err);
                document.getElementById('user-count').textContent = "Error";
            }
        }

        // Templates Logic
        const titleInput = document.getElementById('title');
        const messageInput = document.getElementById('message');
        document.querySelectorAll('.template-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                titleInput.value = btn.getAttribute('data-title');
                messageInput.value = btn.getAttribute('data-body');
            });
        });

        // Broadcast Logic
        const sendBtn = document.getElementById('send-btn');
        const statusEl = document.getElementById('status');

        sendBtn.addEventListener('click', async () => {
            const title = titleInput.value;
            const message = messageInput.value;

            if (!message) {
                statusEl.textContent = "❌ Please enter a message!";
                statusEl.style.color = "#ef4444";
                return;
            }

            sendBtn.textContent = "Sending...";
            sendBtn.disabled = true;

            try {
                await setDoc(doc(db, "notifications", "broadcast"), {
                    title: title || "Global Announcement",
                    message: message,
                    active: true,
                    timestamp: serverTimestamp()
                });

                statusEl.textContent = "✅ Broadcast Sent Successfully!";
                statusEl.style.color = "#10b981";
                titleInput.value = "";
                messageInput.value = "";
                
                setTimeout(() => {
                    statusEl.textContent = "";
                    sendBtn.textContent = "Send Broadcast Now";
                    sendBtn.disabled = false;
                }, 4000);

            } catch (err) {
                console.error(err);
                statusEl.textContent = "❌ Error: Could not send broadcast.";
                statusEl.style.color = "#ef4444";
                sendBtn.textContent = "Send Broadcast Now";
                sendBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
