<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category Insights - Spends & Earns</title>
    <script>
        if (!localStorage.getItem('currentUser')) {
            window.location.replace('auth.html');
        }
    </script>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --card-padding: 16px;
        }

        body {
            background-color: #fafafa;
        }

        h1.page-title {
            font-size: 24px;
            font-weight: 900;
            color: #1e293b;
            text-transform: uppercase;
            letter-spacing: -0.01em;
            margin-bottom: 25px;
            margin-top: 10px;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .mini-card {
            background: white;
            padding: var(--card-padding);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            border: 1px solid #f1f5f9;
        }

        .mini-card .label {
            font-size: 11px;
            font-weight: 800;
            color: #10b981;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .mini-card.spend .label {
            color: #ef4444;
        }

        .mini-card .value {
            font-size: 22px;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 12px;
        }

        .mini-progress {
            height: 6px;
            background: #f1f5f9;
            border-radius: 10px;
            overflow: hidden;
        }

        .mini-fill {
            height: 100%;
            border-radius: 10px;
        }

        .earn-fill { background: #10b981; width: 65%; }
        .spend-fill { background: #ef4444; width: 45%; }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            color: #334155;
            margin-bottom: 15px;
        }

        .breakdown-card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border: 1px solid #f1f5f9;
        }

        .charts-row {
            display: flex;
            justify-content: space-around;
            gap: 15px;
            margin-bottom: 25px;
        }

        .chart-box {
            text-align: center;
            width: 48%;
        }

        .chart-box h3 {
            font-size: 15px;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 15px;
        }

        .chart-canvas-wrapper {
            position: relative;
            height: 140px;
            width: 140px;
            margin: 0 auto;
        }

        .chart-center-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 80%;
        }

        .chart-center-label { font-size: 9px; font-weight: 700; color: #64748b; margin-bottom: 2px; }
        .chart-center-val { font-size: 11px; font-weight: 800; color: #1e293b; }

        .legend-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .legend-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
            padding: 2px 0;
        }

        .legend-left { display: flex; align-items: center; gap: 8px; }
        .dot { width: 10px; height: 100%; aspect-ratio: 1; border-radius: 3px; }
        .name { font-weight: 600; color: #475569; }
        .amt { font-weight: 700; color: #1e293b; }

        .main-content {
            padding-bottom: 100px;
        }
    </style>
</head>
<body>
    <div class="container main-content">
        <h1 class="page-title">Category Insights</h1>

        <div class="summary-grid">
            <div class="mini-card">
                <div class="label">Weekly Earnings</div>
                <div class="value" id="week-earn-val">₹0</div>
                <div class="mini-progress">
                    <div class="mini-fill earn-fill" id="earn-prog"></div>
                </div>
            </div>
            <div class="mini-card spend">
                <div class="label">Weekly Spends</div>
                <div class="value" id="week-spend-val">₹0</div>
                <div class="mini-progress">
                    <div class="mini-fill spend-fill" id="spend-prog"></div>
                </div>
            </div>
        </div>

        <h2 class="section-title text-muted">Category Breakdown</h2>

        <div class="breakdown-card">
            <div class="charts-row">
                <div class="chart-box">
                    <h3>Earns</h3>
                    <div class="chart-canvas-wrapper">
                        <canvas id="earn-chart"></canvas>
                        <div class="chart-center-text">
                            <div class="chart-center-label">Top</div>
                            <div class="chart-center-val" id="top-earn-name">-</div>
                        </div>
                    </div>
                </div>
                <div class="chart-box">
                    <h3>Spends</h3>
                    <div class="chart-canvas-wrapper">
                        <canvas id="spend-chart"></canvas>
                        <div class="chart-center-text">
                            <div class="chart-center-label">Top</div>
                            <div class="chart-center-val" id="top-spend-name">-</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="legend-container">
                <div class="legend-group" id="earn-legend">
                    <!-- Earn labels -->
                </div>
                <div style="height: 1px; background: #f1f5f9; margin: 10px 0;"></div>
                <div class="legend-group" id="spend-legend">
                    <!-- Spend labels -->
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="index.html" class="nav-item">
                <span class="nav-icon">📊</span>
                <span class="nav-label">Tracker</span>
            </a>
            <a href="analytics.html" class="nav-item active">
                <span class="nav-icon">📈</span>
                <span class="nav-label">Analytics</span>
            </a>
            <a href="settings.html" class="nav-item">
                <span class="nav-icon">⚙️</span>
                <span class="nav-label">Settings</span>
            </a>
        </nav>
    </div>

    <script type="module">
        const trackerData = JSON.parse(localStorage.getItem('trackerData')) || [];
        
        function initAnalytics() {
            // Stats calculation (Last 7 days)
            const now = new Date();
            const last7Days = trackerData.filter(d => {
                const diff = (now - new Date(d.date)) / (1000 * 60 * 60 * 24);
                return diff <= 7;
            });

            const weekEarn = last7Days.reduce((s, r) => s + (r.earns || 0) + (r.other || 0), 0);
            const weekSpend = last7Days.reduce((s, r) => s + (r.spends || 0), 0);

            document.getElementById('week-earn-val').textContent = `₹${Math.round(weekEarn).toLocaleString()}`;
            document.getElementById('week-spend-val').textContent = `₹${Math.round(weekSpend).toLocaleString()}`;

            // Progress bar logic (relative to a goal or just ratio)
            const max = Math.max(weekEarn, weekSpend, 5000);
            document.getElementById('earn-prog').style.width = (weekEarn/max * 100) + '%';
            document.getElementById('spend-prog').style.width = (weekSpend/max * 100) + '%';

            renderCharts(last7Days);
        }

        function renderCharts(data) {
            const earnMap = {}, spendMap = {};
            const colors = {
                'Salary': '#10b981', 'Gift': '#34d399', 'Food': '#ef4444', 
                'Shop': '#f59e0b', 'Travel': '#3b82f6', 'Rent': '#6366f1', 
                'Bills': '#ec4899', 'Other': '#94a3b8', '-': '#e2e8f0'
            };

            data.forEach(r => {
                const cat = r.category || '-';
                if (r.earns) earnMap['Salary'] = (earnMap['Salary'] || 0) + r.earns;
                if (r.other) earnMap['Other Income'] = (earnMap['Other Income'] || 0) + r.other;
                
                if (r.spends) {
                    spendMap[cat] = (spendMap[cat] || 0) + r.spends;
                }
            });

            const drawDoughnut = (ctxId, map, centerId) => {
                const labels = Object.keys(map);
                const values = Object.values(map);
                const bg = labels.map(l => colors[l] || colors['Other']);
                
                new Chart(document.getElementById(ctxId), {
                    type: 'doughnut',
                    data: { labels, datasets: [{ data: values, backgroundColor: bg, borderWidth: 0, cutout: '75%' }] },
                    options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
                });

                const top = labels.reduce((a, b) => map[a] > map[b] ? a : b, '-');
                document.getElementById(centerId).textContent = top === '-' ? 'None' : top;
                return { labels, values, bg };
            };

            const eData = drawDoughnut('earn-chart', earnMap, 'top-earn-name');
            const sData = drawDoughnut('spend-chart', spendMap, 'top-spend-name');

            const createLegend = (elId, data) => {
                const el = document.getElementById(elId);
                el.innerHTML = data.labels.map((l, i) => `
                    <div class="legend-item">
                        <div class="legend-left">
                            <div class="dot" style="background:${data.bg[i]}"></div>
                            <span class="name">${l}</span>
                        </div>
                        <span class="amt">₹${Math.round(data.values[i])}</span>
                    </div>
                `).join('');
            };

            createLegend('earn-legend', eData);
            createLegend('spend-legend', sData);
        }

        initAnalytics();
    </script>
</body>
</html>
